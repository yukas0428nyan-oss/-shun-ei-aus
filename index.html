<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>瞬間英語ワーホリ</title>

<style>
body {
    font-family: -apple-system;
    text-align: center;
    padding: 20px;
}
button {
    font-size: 18px;
    padding: 12px 20px;
    margin: 10px;
}
#en {
    color: blue;
    font-size: 22px;
}
</style>
</head>

<body>

<h2 id="ja">スタートを押してね</h2>
<div id="en"></div>

<br>

<button onclick="start()">スタート</button>
<button onclick="correct()">言えた</button>
<button onclick="wrong()">言えなかった</button>

<script>

const data = [
 {ja:"こんにちは", en:"Hello"},
 {ja:"ありがとう", en:"Thank you"},
 {ja:"すみません", en:"Excuse me"},
 {ja:"お会計お願いします", en:"Can I get the bill please?"}
];

let now = 0;
let running = false;

/* 🔥 iOS音声解除 */
function unlockSpeech(){
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
}

/* 🔊 音声 */
function speak(text){
    window.speechSynthesis.cancel();

    setTimeout(()=>{
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US"; // ★iOS安定
        u.rate = 0.9;
        u.volume = 1;
        window.speechSynthesis.speak(u);
    },100);
}

/* ▶スタート */
function start(){
    unlockSpeech();
    running = true;
    next();
}

/* ▶次 */
function next(){
    if(!running) return;

    const q = data[now % data.length];

    document.getElementById("ja").innerText = q.ja;
    document.getElementById("en").innerText = "";

    speak(q.ja); // 日本語（読めない場合あり）

    setTimeout(()=>{
        document.getElementById("en").innerText = q.en;
        speak(q.en);
    },3000);
}

/* 正解 */
function correct(){
    now++;
    next();
}

/* 不正解 */
function wrong(){
    now++;
    next();
}

</script>

</body>
</html>
