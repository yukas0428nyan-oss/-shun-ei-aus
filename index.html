<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬間英作文</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}
#ja { font-size: 22px; margin-top: 30px; }
#en { font-size: 20px; margin-top: 20px; color: #333; }
button { font-size: 18px; padding: 10px 20px; }
</style>
</head>

<body>

<h2>瞬間英作文</h2>

<div id="ja">待機中</div>
<div id="en"></div>

<button onclick="start()">開始</button>

<script>

/* =====================
   問題（テスト用10問）
===================== */
const questions = [

{ja:"ゆりかごの中で眠っている赤ちゃんはかわいかった。",en:"The baby sleeping in the cradle was cute."},
{ja:"あなたはその走っている少年たちが見えますか？",en:"Can you see the running boys?"},
{ja:"校庭を走っている少年たちは彼の生徒たちでした。",en:"The boys running in the school playground were his students."},
{ja:"英語を話しているその少女は誰ですか？",en:"Who is the girl speaking English?"},
{ja:"彼には外国で暮らしているおばさんがいるのですか？",en:"Does he have an aunt living abroad?"},
{ja:"私は海を泳いでいるペンギンを一度も見たことがありません。",en:"I have never seen a penguin swimming in the sea."},
{ja:"あなたはあの角に立っている男の人を知っていますか？",en:"Do you know the man standing at that corner?"},
{ja:"ピアノを弾いている女性は彼のお姉さんでした。",en:"The woman playing the piano was his sister."},

{ja:"あの割れた窓を見なさい。",en:"Look at that broken window."},
{ja:"トムに割られた窓は明日直されるでしょう。",en:"The window broken by Tom will be fixed tomorrow."},
{ja:"彼は中古車を買うつもりです。",en:"He is going to buy a used car."},
{ja:"これは有名な作家に使われた部屋です。",en:"This is a room used by a famous writer."},
{ja:"彼はドイツ製の車を買いたがっています。",en:"He wants to buy a car made in Germany."},
{ja:"これは多くの人に愛されている歌なのですか？",en:"Is this a song loved by many people?"},
{ja:"英語は多くの人に話される言語です。",en:"English is a language spoken by many people."},
{ja:"僕にゆで卵をいくつかください。",en:"Give me some boiled eggs."},
{ja:"彼はお母さんが焼いたケーキを美味しく食べた。",en:"He enjoyed the cake baked by his mother."},

{ja:"公園で走っている人たちが見えますか？",en:"Can you see the people who are running in the park?"},
{ja:"この学校には、外国で生まれた生徒がたくさんいます。",en:"In this school, there are many students who were born abroad."},
{ja:"動物が好きなその少女は獣医になりたがっている。",en:"The girl who likes animals wants to be a veterinarian."},

{ja:"君は昨日僕たちに話しかけた男の人を覚えているかい？",en:"Do you remember the man who spoke to us yesterday?"},
{ja:"毎晩夜更かしするその少年は、よく学校に遅刻する。",en:"The boy who stays up late every night is often late for school."},
{ja:"彼女は、歴史を勉強している大学生ですか？",en:"Is she a college student who studies history?"},
{ja:"この本を書いた作家は誰ですか？",en:"Who is the writer who wrote this book?"},
{ja:"ピアノを弾いている女性はあなたのおばさんですか？",en:"Is the woman who is playing the piano your aunt?"},
{ja:"一生懸命勉強しているその学生はじきに英語が話せるようになるでしょう。",en:"The student who is studying hard will soon be able to speak English."},

{ja:"彼はしっぽの短い猫を飼っている。",en:"He has a cat which has a small tail."},
{ja:"これは3時に出発する電車ですか？",en:"Is this a train which leaves at three o'clock?"},
{ja:"あれは僕の父に作られた机です。",en:"That is a desk which was made by my father."},
{ja:"その大工さんに建てられた家はとても丈夫です。",en:"The house which was built by the carpenter is very strong."},
{ja:"うちの庭にやってくる犬はいつもお腹をすかせている。",en:"The dog which comes to our garden is always hungry."},
{ja:"駅のそばに建っている建物は何ですか？",en:"What is the building which stands near the station?"},
{ja:"船のように見える雲が見えるかい？",en:"Can you see the cloud which looks like a ship?"},
{ja:"先週開店したレストランに行こう。",en:"Let's go to the restaurant which opened last week."},
{ja:"子供たちは花でおおわれた丘で遊んだ。",en:"The children played on the hill which was covered with flowers."},

{ja:"彼にはお父さんがパイロットである友達がいます。",en:"He has a friend whose father is a pilot."},
{ja:"髪が長いあの少女がナンシーです。",en:"That girl whose hair is long is Nancy."},
{ja:"お母さんが中国人のその少年は中国語を話せますか？",en:"Can the boy whose mother is Chinese speak Chinese?"},
{ja:"自動車が故障してしまったその男性は、電車で仕事に行った。",en:"The man whose car broke down went to work by train."},
{ja:"あの庭の大きな家は僕のおばさんのです。",en:"That house whose garden is big is my aunt's."},

{ja:"私は彼の言ったことが理解できなかった。",en:"I could not understand what he said."},
{ja:"それが、あなたが望むことなのですか？",en:"Is that what you want?"},
{ja:"彼について知っていることを教えてもらえる？",en:"Will you please tell me what you know about him?"},
{ja:"彼らがしたことは正しかった。",en:"What they did was right."},
{ja:"君がしなければならないのは毎日勉強することだ。",en:"What you have to do is study every day."},

{ja:"彼女はあまりに疲れていて立ち上がることができない。",en:"She is too tired to stand up."},
{ja:"私は忙しすぎてあなたを手伝うことはできません。",en:"I am too busy to help you."},
{ja:"彼らの息子は一人で旅行するには幼すぎる。",en:"Their son is too young to travel alone."},
{ja:"このコーヒーは濃すぎて僕は飲めない。",en:"This coffee is too strong for me to drink."},
{ja:"この料理は辛すぎて私は食べられません。",en:"This dish is too spicy for me to eat."},

{ja:"彼は親切にも僕の宿題を手伝ってくれた。",en:"He was kind enough to help me with my homework."},
{ja:"この部屋は本を読むのに十分明るい。",en:"It is light enough in this room to read a book."},
{ja:"その箱は軽いので女性でも運べる。",en:"The box is light enough for a woman to carry."},

{ja:"彼はとても親切なので、みんな彼のことが好きだ。",en:"He is so kind that everyone likes him."},
{ja:"昨日はとても寒かったので僕らは外出しなかった。",en:"It was so cold yesterday that we did not go out."},
{ja:"彼女はとても興奮していたので眠ることができなかった。",en:"She was so excited that she could not sleep."},

{ja:"私は彼女が何か言うのを聞きました。",en:"I heard her say something."},
{ja:"あなたは彼があの店に入るのをよく見かけますか？",en:"Do you often see him go into the store?"},
{ja:"僕はあの飛行機が離陸するのを見たい。",en:"I want to see the plane take off."},
{ja:"鳥たちが歌うのを聴いてごらん。",en:"Listen to the birds sing."},

{ja:"彼の父は彼に毎日ドイツ語を勉強させた。",en:"His father made him study German every day."},
{ja:"彼は秘書に手紙をタイプしてもらった。",en:"He had his secretary type the letter."},
{ja:"彼女はウェイターに水を一杯持ってきてもらった。",en:"She had the waiter bring a glass of water."},
{ja:"あなたは息子さんを一人で外国に行かせてあげるつもりですか？",en:"Are you going to let your son go abroad alone?"},

{ja:"あれは彼が生まれた村です。",en:"That is the village where he was born."},
{ja:"彼女がその本を買った書店はどこにあるのですか？",en:"Where is the bookstore where she bought the book?"},
{ja:"僕たちは何か食べるものを買える店に行きたい。",en:"We want to go to a store where we can buy something to eat."},

{ja:"6月は雨がたくさん降る月です。",en:"June is the month when it rains a lot."},
{ja:"僕は彼に初めてあった日を覚えている。",en:"I remember the day when I first met him."},
{ja:"飛行機が到着する時間を知っていますか？",en:"Do you know the time when the plane will arrive?"},
];

let order = [];
let i = 0;
let initialized = false;

/* シャッフル（重複なし） */
function shuffle(){
  order = [...Array(questions.length).keys()]
    .sort(() => Math.random() - 0.5);
}

/* =====================
   音声（iOS安定化版）
===================== */
function speak(text, lang){

  return new Promise((resolve) => {

    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 1;

    u.onend = () => resolve();

    setTimeout(() => {

      // ★初回ウォームアップ（最重要）
      if (!initialized) {
        const warm = new SpeechSynthesisUtterance(" ");
        warm.volume = 0;
        speechSynthesis.speak(warm);
        initialized = true;
      }

      // ★再生前に軽くリセット（やりすぎない）
      speechSynthesis.cancel();

      // ★少し待ってから再生（冒頭欠け防止）
      setTimeout(() => {
        speechSynthesis.speak(u);
      }, 120);

    }, 200);

  });

}

/* =====================
   メインループ
===================== */
async function run(){

  if(i >= order.length){
    shuffle();
    i = 0;
  }

  const q = questions[order[i]];

  document.getElementById("ja").innerText = q.ja;
  document.getElementById("en").innerText = "";

  // 日本語
  await speak(q.ja, "ja-JP");

  // ポーズ（安定用）
  await new Promise(r => setTimeout(r, 5000));

  // 英語表示
  document.getElementById("en").innerText = q.en;

  // 英語
  await speak(q.en, "en-US");

  // 次へ
  await new Promise(r => setTimeout(r, 2000));

  i++;
  run();
}

function start(){
  initialized = false;
  shuffle();
  i = 0;
  run();
}

</script>

</body>
</html>
