<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬英ワーホリ</title>
</head>

<body>
<h2 id="ja">スタートを押してください</h2>
<h3 id="en"></h3>

<button onclick="start()">スタート</button>

<script>
const quiz = [
  {ja:"こんにちは", en:"Hello"},
  {ja:"ありがとう", en:"Thank you"},
  {ja:"すみません", en:"Excuse me"},
  {ja:"トイレはどこ？", en:"Where is the bathroom?"},
  {ja:"いくらですか？", en:"How much is it?"}
];

let i = 0;
let running = false;

function speak(text, lang){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function next(){
  if(!running) return;

  const q = quiz[Math.floor(Math.random()*quiz.length)];

  document.getElementById("ja").innerText = q.ja;
  document.getElementById("en").innerText = "";

  speak(q.ja,"ja-JP");

  setTimeout(()=>{
    document.getElementById("en").innerText = q.en;
    speak(q.en,"en-US");

    setTimeout(next, 4000);
  }, 3000);
}

function start(){
  running = true;
  next();
}
</script>

</body>
</html>
