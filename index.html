<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>瞬間英作文アプリ</title>

<style>
body{
font-family:-apple-system;
margin:0;
padding:20px;
text-align:center;
}
.card{
font-size:22px;
margin-top:40px;
min-height:120px;
}
.en{
color:#007aff;
font-size:20px;
margin-top:10px;
}
button{
margin:10px;
padding:15px 25px;
font-size:16px;
}
</style>
</head>

<body>

<h2>瞬間英作文</h2>

<div class="card">
<div id="ja">スタートを押してね</div>
<div id="en" class="en"></div>
</div>

<button onclick="start()">スタート</button>

<script>
/* =========================
問題データ（中3 + 実用）
========================= */
const data = [
{ja:"もし明日晴れたら、ピクニックに行きます。",en:"If it is fine tomorrow, we will go on a picnic."},
{ja:"彼が来なければ私がやる。",en:"If he doesn't come, I will do it."},
{ja:"英語を覚えたいなら勉強しなさい。",en:"If you want to learn English, study harder."},
{ja:"私はとても疲れていたので寝た。",en:"I was very tired, so I went to bed."},
{ja:"宿題を終えたらテレビを見ていいよ。",en:"You can watch TV after you finish your homework."},
{ja:"彼が帰ってくるまで待ちます。",en:"I will wait until he comes back."},
{ja:"これは彼が書いた本です。",en:"This is the book he wrote."},
{ja:"私は彼が走るのを見た。",en:"I saw him run."},
{ja:"彼女は私に部屋を掃除させた。",en:"She made me clean my room."},
{ja:"私はあなたに来てほしい。",en:"I want you to come."},

// ワーホリ実用
{ja:"お会計お願いします。",en:"Can I get the bill, please?"},
{ja:"テイクアウトできますか？",en:"Is this takeaway?"},
{ja:"フラットホワイトください。",en:"Can I have a flat white?"},
{ja:"この仕事に応募したいです。",en:"I want to apply for this job."},
{ja:"履歴書を渡してもいいですか？",en:"Can I give you my resume?"},
{ja:"週に何時間働けますか？",en:"How many hours can I work per week?"}
];

let order = [];
let i = 0;
let running = false;

/* シャッフル */
function shuffle(){
order = [...Array(data.length).keys()]
.sort(()=>Math.random()-0.5);
}

/* 音声 */
function speak(text, lang, rate=1){
return new Promise(resolve=>{
const u = new SpeechSynthesisUtterance(text);
u.lang = lang;
u.rate = rate;
u.onend = ()=>setTimeout(resolve, 500); // ←重要：切れ防止
speechSynthesis.speak(u);
});
}

/* 1問進行 */
async function loop(){

if(!running) return;

const q = data[order[i]];

/* 日本語 */
document.getElementById("ja").innerText = q.ja;
document.getElementById("en").innerText = "";

await speak(q.ja, "ja-JP", 1.0);

/* ポーズ（重要） */
await new Promise(r=>setTimeout(r, 5000));

/* 英語 */
document.getElementById("en").innerText = q.en;
await speak(q.en, "en-AU", 0.95);

/* ポーズ（次へ前） */
await new Promise(r=>setTimeout(r, 2000));

/* 次へ（ランダムループ） */
i++;
if(i>=order.length){
shuffle();
i=0;
}

loop();
}

function start(){
if(running) return;
running = true;
shuffle();
i = 0;
loop();
}
</script>

</body>
</html>
