<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬間英作文</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}
#ja { font-size: 22px; margin-top: 30px; }
#en { font-size: 20px; margin-top: 20px; color: #333; }
button { font-size: 18px; padding: 10px 20px; }
</style>
</head>

<body>

<h2>瞬間英作文</h2>

<div id="ja">待機中</div>
<div id="en"></div>

<button onclick="start()">開始</button>

<script>

/* =====================
   問題（テスト用10問）
===================== */
const questions = [

{ja:"もし明日雨が降ったら、私は家にいます。",en:"If it rains tomorrow, I will stay at home."},
{ja:"彼が来たら、私たちはすぐに出発します。",en:"If he comes, we will leave at once."},
{ja:"彼女が忙しかったので、彼は手伝いました。",en:"As she was busy, he helped her."},
{ja:"私は病気だったので学校に行きませんでした。",en:"I didn’t go to school because I was sick."},
{ja:"テレビを見る前に宿題をしなさい。",en:"Do your homework before you watch TV."},

{ja:"夕食を食べた後で散歩に行きました。",en:"I went for a walk after I had dinner."},
{ja:"彼は疲れていたので早く寝ました。",en:"He went to bed early because he was tired."},
{ja:"彼が帰ってくるまでここで待ちましょう。",en:"Let’s wait here until he comes back."},
{ja:"彼が英語を話しているのを見ました。",en:"I saw him speaking English."},
{ja:"その犬は公園で走っている少年です。",en:"The dog is the boy running in the park."},

{ja:"私は彼がどこにいるのか知りません。",en:"I don’t know where he is."},
{ja:"彼女が何をしたのか教えてください。",en:"Please tell me what she did."},
{ja:"彼は何を買うべきか分かりません。",en:"He doesn’t know what to buy."},
{ja:"英語を勉強することは大切です。",en:"It is important to study English."},
{ja:"その本を読むのはとても簡単です。",en:"It is very easy to read the book."},

{ja:"私はあなたにここにいてほしい。",en:"I want you to stay here."},
{ja:"彼は私に毎日勉強するように言いました。",en:"He told me to study every day."},
{ja:"先生は生徒に宿題を出しました。",en:"The teacher gave the students homework."},
{ja:"私は彼にドアを開けさせました。",en:"I made him open the door."},
{ja:"彼女は私にその本を読ませてくれました。",en:"She let me read the book."},

{ja:"これは彼が書いた手紙です。",en:"This is the letter which he wrote."},
{ja:"私が昨日会った人は医者です。",en:"The man I met yesterday is a doctor."},
{ja:"彼が住んでいる家は大きいです。",en:"The house where he lives is big."},
{ja:"私たちが行った場所はとても美しかった。",en:"The place we went to was very beautiful."},
{ja:"彼女が話している女性は私の先生です。",en:"The woman she is speaking to is my teacher."},

{ja:"私は走っている子どもたちを見ました。",en:"I saw the running children."},
{ja:"彼は壊れた窓を直しました。",en:"He fixed the broken window."},
{ja:"英語で書かれた本を読みました。",en:"I read a book written in English."},
{ja:"そのケーキは彼女のお母さんに作られました。",en:"The cake was made by her mother."},
{ja:"私はとても疲れていて立てませんでした。",en:"I was too tired to stand up."},

{ja:"彼はとても速く走ったので勝ちました。",en:"He ran so fast that he won."},
{ja:"彼女はとても忙しくて私を助けられませんでした。",en:"She was so busy that she couldn’t help me."},
{ja:"その映画はとても面白くて3回見ました。",en:"The movie was so interesting that I saw it three times."},
{ja:"彼は勉強しすぎて眠れませんでした。",en:"He studied too much to sleep."},
{ja:"私はお金がなかったのでその本を買いませんでした。",en:"I didn’t buy the book because I had no money."},

{ja:"彼女はピアノを練習している間、弟はゲームをしていました。",en:"While she was practicing the piano, her brother was playing games."},
{ja:"私が勉強している間に電話が鳴りました。",en:"While I was studying, the phone rang."},
{ja:"彼が来るまで私たちは待ちます。",en:"We will wait until he comes."},
{ja:"その仕事を終えるまでここにいてください。",en:"Please stay here until you finish the work."},
{ja:"彼は車を洗った後で雨が降り始めました。",en:"It began to rain after he washed his car."},

{ja:"彼はとても親切なのでみんなに好かれています。",en:"He is so kind that everyone likes him."},
{ja:"その問題はとても難しくて解けませんでした。",en:"The problem was so difficult that I couldn’t solve it."},
{ja:"彼女は英語を話すことができます。",en:"She can speak English."},
{ja:"私はあなたにそのことを説明したい。",en:"I want to explain it to you."},
{ja:"彼は私にそのドアを開けるように頼みました。",en:"He asked me to open the door."},

{ja:"私は彼にそこへ行かないように言いました。",en:"I told him not to go there."},
{ja:"彼女はその部屋をきれいにしておきます。",en:"She keeps her room clean."},
{ja:"彼はその機械の使い方を知っています。",en:"He knows how to use the machine."},
{ja:"その店で何を買うべきか教えてください。",en:"Please tell me what to buy at the store."},
{ja:"私は彼が何を言ったのか理解できませんでした。",en:"I couldn’t understand what he said."}
];

let order = [];
let i = 0;
let initialized = false;

/* シャッフル（重複なし） */
function shuffle(){
  order = [...Array(questions.length).keys()]
    .sort(() => Math.random() - 0.5);
}

/* =====================
   音声（iOS安定化版）
===================== */
function speak(text, lang){

  return new Promise((resolve) => {

    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 1;

    u.onend = () => resolve();

    setTimeout(() => {

      // ★初回ウォームアップ（最重要）
      if (!initialized) {
        const warm = new SpeechSynthesisUtterance(" ");
        warm.volume = 0;
        speechSynthesis.speak(warm);
        initialized = true;
      }

      // ★再生前に軽くリセット（やりすぎない）
      speechSynthesis.cancel();

      // ★少し待ってから再生（冒頭欠け防止）
      setTimeout(() => {
        speechSynthesis.speak(u);
      }, 120);

    }, 200);

  });

}

/* =====================
   メインループ
===================== */
async function run(){

  if(i >= order.length){
    shuffle();
    i = 0;
  }

  const q = questions[order[i]];

  document.getElementById("ja").innerText = q.ja;
  document.getElementById("en").innerText = "";

  // 日本語
  await speak(q.ja, "ja-JP");

  // ポーズ（安定用）
  await new Promise(r => setTimeout(r, 5000));

  // 英語表示
  document.getElementById("en").innerText = q.en;

  // 英語
  await speak(q.en, "en-US");

  // 次へ
  await new Promise(r => setTimeout(r, 2000));

  i++;
  run();
}

function start(){
  initialized = false;
  shuffle();
  i = 0;
  run();
}

</script>

</body>
</html>
