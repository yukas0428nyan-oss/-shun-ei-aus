let order = [];
let i = 0;
let initialized = false;

/* シャッフル（重複なし） */
function shuffle(){
  order = [...Array(questions.length).keys()]
    .sort(() => Math.random() - 0.5);
}

/* =====================
   音声（iOS安定化版）
===================== */
function speak(text, lang){

  return new Promise((resolve) => {

    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 1;

    u.onend = () => resolve();

    setTimeout(() => {

      // ★初回ウォームアップ（最重要）
      if (!initialized) {
        const warm = new SpeechSynthesisUtterance(" ");
        warm.volume = 0;
        speechSynthesis.speak(warm);
        initialized = true;
      }

      // ★再生前に軽くリセット（やりすぎない）
      speechSynthesis.cancel();

      // ★少し待ってから再生（冒頭欠け防止）
      setTimeout(() => {
        speechSynthesis.speak(u);
      }, 120);

    }, 200);

  });

}

/* =====================
   メインループ
===================== */
async function run(){

  if(i >= order.length){
    shuffle();
    i = 0;
  }

  const q = questions[order[i]];

  document.getElementById("ja").innerText = q.ja;
  document.getElementById("en").innerText = "";

  // 日本語
  await speak(q.ja, "ja-JP");

  // ポーズ（安定用）
  await new Promise(r => setTimeout(r, 5000));

  // 英語表示
  document.getElementById("en").innerText = q.en;

  // 英語
  await speak(q.en, "en-US");

  // 次へ
  await new Promise(r => setTimeout(r, 2000));

  i++;
  run();
}

function start(){
  initialized = false;
  shuffle();
  i = 0;
  run();
}
