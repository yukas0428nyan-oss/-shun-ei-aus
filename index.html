<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬間英作文</title>

<style>
body {
  font-family: -apple-system;
  text-align: center;
  padding: 20px;
}

#ja {
  font-size: 24px;
  margin: 30px 0;
}

#en {
  font-size: 22px;
  color: #007aff;
  margin: 20px 0;
}

button {
  font-size: 18px;
  padding: 15px;
  margin: 10px;
}
</style>
</head>

<body>

<h2>瞬間英作文（自動再生版）</h2>

<div id="ja">スタートを押してください</div>
<div id="en"></div>

<button onclick="start()">スタート</button>
<button onclick="correct()">言えた</button>
<button onclick="wrong()">言えない</button>

<script>

/* =========================
   問題データ（中3＋ワーホリ）
========================= */
const data = [
{ja:"もし明日晴れたら、私たちはピクニックに行きます。",en:"If it is fine tomorrow, we will go on a picnic."},
{ja:"彼が来なければ、私がやる。",en:"If he doesn’t come, I will do it."},
{ja:"英語を学ぶことは大切です。",en:"It is important to learn English."},
{ja:"彼女は疲れていたので出かけなかった。",en:"She was tired, so she didn’t go out."},
{ja:"私は彼が何を言ったのか分からなかった。",en:"I didn’t know what he said."},
{ja:"彼が走っている少年を見た。",en:"I saw the boy running."},
{ja:"彼にドアを開けさせた。",en:"I made him open the door."},
{ja:"これは私が昨日買った本です。",en:"This is the book I bought yesterday."},
{ja:"彼女はとても疲れていて立てなかった。",en:"She was too tired to stand up."},
{ja:"彼は親切にも私を助けてくれた。",en:"He was kind enough to help me."},

// ワーホリ
{ja:"こんにちは、お会計お願いします。",en:"Can I get the bill, please?"},
{ja:"持ち帰りでお願いします。",en:"To go, please."},
{ja:"今アルバイト募集してますか？",en:"Are you hiring now?"},
{ja:"履歴書を渡してもいいですか？",en:"Can I leave my resume?"}
];

let index = 0;

/* =========================
   音声再生（重要修正）
========================= */
function speak(text, lang, callback){

  const u = new SpeechSynthesisUtterance(text);

  if(lang === "ja"){
    u.lang = "ja-JP";
    u.rate = 1.05; // 日本語やや速め
  } else {
    u.lang = "en-AU";
    u.rate = 0.9;
  }

  u.onend = () => {
    if(callback) callback();
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* =========================
   メイン処理（完全修正版）
========================= */
function next(){

  const q = data[index];

  document.getElementById("ja").innerText = q.ja;
  document.getElementById("en").innerText = "";

  // ① 日本語
  speak(q.ja, "ja", () => {

    // ② 英語
    speak(q.en, "en", () => {

      // ③ 英語完全終了 → 2秒待機
      setTimeout(() => {

        index++;
        if(index >= data.length) index = 0;

        next();

      }, 2000);

    });

  });
}

/* =========================
   操作
========================= */
function start(){
  index = 0;
  next();
}

function correct(){
  index++;
  next();
}

function wrong(){
  index++;
  next();
}

</script>

</body>
</html>
