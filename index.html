<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬間英作文（改良版）</title>

<style>
body {
    font-family: -apple-system;
    text-align: center;
    padding: 20px;
}
#ja {
    font-size: 22px;
    margin: 30px 0;
}
#en {
    font-size: 20px;
    color: #007aff;
    margin: 20px 0;
}
button {
    font-size: 18px;
    padding: 12px 20px;
    margin: 10px;
}
</style>
</head>

<body>

<h2>瞬間英作文（聞き流しモード）</h2>

<div id="ja">スタートを押してください</div>
<div id="en"></div>

<br>

<button onclick="start()">スタート</button>

<script>
/* =========================
  中3フル問題（あなたの貼ったやつ）
========================= */

const quiz = [
{ja:"もし明日晴れたら、僕たちはピクニックに行きます。",en:"If it is fine tomorrow, we will go on a picnic."},
{ja:"もし彼が明日来なかったら、僕がその仕事をするよ。",en:"If he doesn’t come tomorrow, I will do the work."},
{ja:"英語を覚えたいなら、君はもっと勉強しなければならない。",en:"If you want to learn English, you have to study more regularly."},
{ja:"病気だったので、彼女は欠席した。",en:"As she was sick, she was absent."},
{ja:"雨が降っていたので、彼は家にいた。",en:"He stayed home because it was raining."},
{ja:"とても疲れていたので、彼女は泳ぎに行かなかった。",en:"She was very tired so she didn’t go swimming."},
{ja:"宿題はテレビを見る前にしなければならない。",en:"You have to do your homework before you watch TV."},
{ja:"彼が何歳か知ってる？",en:"Do you know how old he is?"},
{ja:"僕は彼が何と言ったか分からなかった。",en:"I didn’t know what he said."},
{ja:"英語を学ぶことは大切です。",en:"It is important to learn English."},
{ja:"彼女は私に宿題をするように言った。",en:"She told me to do my homework."},
{ja:"彼は走っている少年を見た。",en:"He saw the boy running."},
{ja:"その窓はトムに割られた。",en:"The window was broken by Tom."}
];

let index = 0;

/* =========================
  音声（iPhone安定版）
========================= */

function speak(text, lang) {
    return new Promise(resolve => {

        window.speechSynthesis.cancel();

        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;

        // iPhone安定設定
        u.rate = 0.9;
        u.pitch = 1;

        u.onend = () => setTimeout(resolve, 500); // ←重要：余白

        window.speechSynthesis.speak(u);
    });
}

/* =========================
  メインループ（完全自動）
========================= */

async function loop() {

    if (index >= quiz.length) {
        index = 0;
    }

    const q = quiz[index];

    document.getElementById("ja").innerText = q.ja;
    document.getElementById("en").innerText = "";

    // ① 日本語
    await speak(q.ja, "ja-JP");

    // ② 6秒待つ（ここが改善ポイント）
    await wait(6000);

    // ③ 英語
    document.getElementById("en").innerText = q.en;
    await speak(q.en, "en-US");

    // ④ 6秒待つ
    await wait(6000);

    // 次へ
    index++;
    loop();
}

/* =========================
  スタート
========================= */

function start() {
    index = 0;
    loop();
}

/* =========================
  wait関数
========================= */

function wait(ms) {
    return new Promise(r => setTimeout(r, ms));
}

</script>

</body>
</html>
