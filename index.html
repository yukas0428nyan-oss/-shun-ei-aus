<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬英ワーホリ</title>

<style>
body {
  font-family: -apple-system;
  margin: 0;
  padding: 20px;
  text-align: center;
}

.ja { font-size: 22px; margin: 20px; }
.en { font-size: 20px; color: #007aff; margin: 20px; opacity: 0; transition: 0.3s; }
.en.show { opacity: 1; }

button {
  font-size: 18px;
  padding: 15px;
  margin: 10px;
}
</style>
</head>

<body>

<h2>瞬英ワーホリ（安定版）</h2>

<div id="ja" class="ja">スタートしてください</div>
<div id="en" class="en"></div>

<br>

<button onclick="start()">スタート</button>
<button onclick="answer(true)">言えた</button>
<button onclick="answer(false)">言えなかった</button>

<script>
const quiz = [
  {ja:"こんにちは", en:"Hello"},
  {ja:"ありがとう", en:"Thank you"},
  {ja:"これは何ですか？", en:"What is this?"},
  {ja:"助けてください", en:"Help me please"},
  {ja:"トイレはどこですか？", en:"Where is the toilet?"}
];

let current = null;
let running = false;
let stage = "idle";
let lock = false;

function speak(text, lang) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

function wait(ms){
  return new Promise(r => setTimeout(r, ms));
}

async function start() {
  running = true;
  next();
}

async function next() {
  if (!running || lock) return;
  lock = true;

  current = quiz[Math.floor(Math.random() * quiz.length)];

  stage = "ja";
  document.getElementById("en").classList.remove("show");
  document.getElementById("en").innerText = "";

  document.getElementById("ja").innerText = current.ja;

  speak(current.ja, "ja-JP");

  await wait(2500); // ⭐日本語と英語の間の余白

  stage = "en";
  document.getElementById("en").innerText = current.en;
  document.getElementById("en").classList.add("show");

  speak(current.en, "en-US");

  lock = false;
}

async function answer(correct){
  if (stage !== "en") return;

  stage = "wait";

  if (correct) {
    document.getElementById("ja").innerText = "👍 OK";
  } else {
    document.getElementById("ja").innerText = "復習しよう";
  }

  await wait(1200); // ⭐次問題までの余白

  next();
}
</script>

</body>
</html>
